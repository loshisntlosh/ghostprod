<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Viewport estricto para eliminar el scroll horizontal en móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Reproductor Inteligente V3.2</title>
    <style>
        /* CONFIGURACIÓN GENERAL PARA EVITAR DESBORDES */
        * { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }
        
        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden; /* Cierra el paso a cualquier scroll lateral */
            background-color: #0f0f12;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* CAPA DE FONDO DINÁMICO CON BLUR */
        .background-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-size: cover;
            background-position: center;
            filter: blur(25px);
            transform: scale(1.1);
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        @media (max-width: 767px) or (orientation: portrait) {
            .background-blur { background-image: url('vertical.jpg'); }
        }

        @media (min-width: 768px) and (orientation: landscape) {
            .background-blur { background-image: url('horizontal.jpg'); }
        }

        .background-blur.show-bg { opacity: 0.35; }

        /* PANTALLA DE CONTRASEÑA */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0f0f12;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        .login-box {
            background: linear-gradient(145deg, #18181c, #121214);
            padding: 35px 25px;
            border-radius: 28px;
            text-align: center;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #252529;
        }
        .login-box h2 { margin-bottom: 10px; font-size: 1.6em; font-weight: 700; }
        .login-box p { color: #a0a0ab; font-size: 0.9em; margin-bottom: 25px; }
        .login-input {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            border: 1px solid #252529;
            background-color: #1e1e24;
            color: white;
            font-size: 1em;
            outline: none;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            border: none;
            background-color: #ffffff;
            color: #000000;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
        }
        .login-error { color: #ff4a4a; font-size: 0.85em; margin-top: 15px; min-height: 18px; font-weight: 500; }

        /* REPRODUCTOR ESTRUCTURA BASE (Por defecto móvil vertical) */
        .player-container {
            background: rgba(24, 24, 28, 0.85);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 360px; /* Ancho controlado para móvil */
            padding: 20px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-bar {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid #252529;
            background-color: #1e1e24;
            color: white;
            font-size: 0.95em;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
        }

        /* El contenedor que decide si es fila o columna */
        .player-content { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
            width: 100%;
        }

        .cover-art {
            width: 240px;
            height: 240px;
            background-color: #252529;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="%23555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>');
            background-position: center;
            background-size: 40%;
            background-repeat: no-repeat;
            border-radius: 24px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex-shrink: 0; /* Evita que la portada se deforme */
        }

        .track-info { 
            width: 100%; 
            display: flex;
            flex-direction: column;
        }
        
        .track-title { font-size: 1.3em; margin-bottom: 4px; font-weight: bold; }
        .track-artist { color: #a0a0ab; font-size: 0.95em; margin-bottom: 12px; word-break: break-word; }

        .seek-container { width: 100%; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-size: 0.8em; color: #a0a0ab; }
        .seek-bar { flex: 1; margin: 0 10px; height: 5px; border-radius: 5px; background-color: #252529; position: relative; cursor: pointer; overflow: hidden; }
        .seek-progress { height: 100%; border-radius: 5px; background-color: #ffffff; width: 0%; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 12px; }
        .controls button { background: none; border: none; color: white; font-size: 1.8em; cursor: pointer; opacity: 0.8; }
        
        .play-btn {
            background-color: #ffffff !important;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000000 !important;
            font-size: 1.2em !important;
            box-shadow: 0 6px 15px rgba(255,255,255,0.2);
            opacity: 1 !important;
        }

        #shuffleBtn.active { color: #1db954; opacity: 1; }

        .volume-container { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; color: #a0a0ab; font-size: 0.9em; }
        .volume-slider { -webkit-appearance: none; width: 50%; height: 4px; border-radius: 5px; background: #252529; outline: none; cursor: pointer; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #ffffff; }

        .playlist-container { border-top: 1px solid #252529; padding-top: 10px; max-height: 150px; overflow-y: auto; text-align: left; }
        .playlist-container::-webkit-scrollbar { width: 4px; }
        .playlist-container::-webkit-scrollbar-thumb { background: #252529; border-radius: 10px; }

        .playlist-item { display: flex; align-items: center; padding: 10px 12px; border-radius: 12px; cursor: pointer; margin-bottom: 4px; }
        .playlist-item:hover { background-color: #1e1e24; }
        .playlist-item.active { background-color: rgba(255, 255, 255, 0.08); border-left: 4px solid #ffffff; color: #1db954; }
        .playlist-item-info { flex: 1; min-width: 0; }
        .playlist-item-title { font-size: 0.9em; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .playlist-item-artist { font-size: 0.8em; color: #a0a0ab; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* =========================================================
           CAMBIO REVOLUCIONARIO: MODO HORIZONTAL (PC Y CELULAR ACOSTADO)
           ========================================================= */
        @media (min-width: 768px) or (orientation: landscape) {
            body { padding: 20px; }
            
            .player-container { 
                max-width: 720px; /* Más ancho para dar espacio a los lados */
                padding: 25px;
            }

            .player-content { 
                flex-direction: row; /* ¡Portada izquierda, controles derecha! */
                align-items: stretch;
                text-align: left; 
                gap: 25px; 
            }

            .cover-art { 
                width: 280px; 
                height: 280px; 
                margin-bottom: 0; /* Ya no necesita empujar hacia abajo */
            }

            .track-info {
                justify-content: center; /* Centra el contenido verticalmente a la derecha */
            }

            .controls { 
                justify-content: flex-start; /* Controles alineados a la izquierda en su bloque */
                gap: 20px; 
            }

            .volume-container { 
                justify-content: flex-start; 
            }
            
            .volume-slider {
                width: 40%;
            }

            .playlist-container { 
                max-height: 120px; /* Ajuste para que entre perfecto en pantallas pequeñas de celular horizontal */
            }
        }
    </style>
</head>
<body>

    <div id="bgBlur" class="background-blur"></div>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2>Acceso Privado</h2>
            <p>Por favor ingresa la contraseña para continuar</p>
            <input type="password" id="passwordInput" class="login-input" placeholder="••••••••">
            <button id="loginBtn" class="login-btn">Entrar</button>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <div class="player-container">
        <input type="text" id="search" class="search-bar" placeholder="Buscar canción o artista...">

        <div class="player-content">
            <!-- Izquierda en Horizontal / Arriba en Vertical -->
            <div id="cover" class="cover-art"></div>
            
            <!-- Derecha en Horizontal / Abajo en Vertical -->
            <div class="track-info">
                <h2 id="title" class="track-title">Conectando...</h2>
                <p id="artist" class="track-artist">Por favor espera</p>
                
                <div class="seek-container">
                    <span id="currentTime">0:00</span>
                    <div id="seekBar" class="seek-bar">
                        <div id="seekProgress" class="seek-progress"></div>
                    </div>
                    <span id="durationTime">0:00</span>
                </div>

                <div class="controls">
                    <button id="shuffleBtn">🔀</button>
                    <button id="prevBtn">⏮</button>
                    <button id="playBtn" class="play-btn">▶</button>
                    <button id="nextBtn">⏭</button>
                </div>

                <div class="volume-container">
                    <span>🔈</span>
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
                    <span>🔊</span>
                </div>

                <div id="playlist" class="playlist-container"></div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="auto"></audio>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
            });
        }

        const SUPABASE_URL = "https://xkbxlrmodzucmpxcnwtj.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhrYnhscm1vZHp1Y21weGNud3RqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNjA4MjIsImV4cCI6MjA5ODgzNjgyMn0.GQdaROzvGo1JTd3IYb5vDetuO5cq6UiGFrGHN7azWy8";

        let cancionesOriginales = []; 
        let playlistFiltrada = [];    
        let currentTrackIndex = 0;
        let isPlaying = false;
        let isShuffle = false;

        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const titleEl = document.getElementById('title');
        const artistEl = document.getElementById('artist');
        const coverEl = document.getElementById('cover');
        const searchInput = document.getElementById('search');
        const playlistEl = document.getElementById('playlist');
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');
        const seekBar = document.getElementById('seekBar');
        const seekProgress = document.getElementById('seekProgress');
        const volumeSlider = document.getElementById('volumeSlider');
        const bgBlur = document.getElementById('bgBlur');

        const loginOverlay = document.getElementById('loginOverlay');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');

        function validarAcceso() {
            if (passwordInput.value === "monter1a") {
                loginOverlay.style.opacity = '0';
                setTimeout(() => { loginOverlay.style.display = 'none'; }, 400);
                bgBlur.classList.add('show-bg');
                
                // Desbloqueo silencioso para celulares
                audio.play().then(() => { audio.pause(); }).catch(() => {});
                
                cargarCanciones();
            } else {
                loginError.textContent = "Contraseña incorrecta. Inténtalo de nuevo.";
                passwordInput.value = "";
                passwordInput.focus();
            }
        }

        loginBtn.addEventListener('click', validarAcceso);
        passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') validarAcceso(); });

        async function cargarCanciones() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/canciones?select=*`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                });
                if (!response.ok) throw new Error("Fallo");
                cancionesOriginales = await response.json();
                localStorage.setItem('db_cache_canciones', JSON.stringify(cancionesOriginales));
            } catch (e) { 
                const dataGuardada = localStorage.getItem('db_cache_canciones');
                if (dataGuardada) cancionesOriginales = JSON.parse(dataGuardada);
            }
            playlistFiltrada = [...cancionesOriginales];
            if (playlistFiltrada.length > 0) { 
                initPlayer(); 
            }
        }

        function renderPlaylist(songs) {
            playlistEl.innerHTML = '';
            songs.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = `playlist-item ${index === currentTrackIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="playlist-item-info">
                        <p class="playlist-item-title">${track.titulo || 'Sin título'}</p>
                        <p class="playlist-item-artist">${track.artista || 'Artista desconocido'}</p>
                    </div>
                `;
                item.addEventListener('click', () => {
                    currentTrackIndex = index;
                    loadTrack(currentTrackIndex);
                    audio.play().then(() => {
                        isPlaying = true;
                        playBtn.textContent = '⏸';
                    }).catch(() => {
                        audio.play();
                        isPlaying = true;
                        playBtn.textContent = '⏸';
                    });
                    actualizarResaltadoLista();
                });
                playlistEl.appendChild(item);
            });
        }

        function actualizarResaltadoLista() {
            const items = playlistEl.querySelectorAll('.playlist-item');
            items.forEach((item, index) => {
                if (index === currentTrackIndex) {
                    item.classList.add('active');
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function initPlayer() {
            audio.volume = volumeSlider.value;
            loadTrack(currentTrackIndex);
            renderPlaylist(playlistFiltrada);

            playBtn.addEventListener('click', togglePlay);
            nextBtn.addEventListener('click', nextTrack);
            prevBtn.addEventListener('click', prevTrack);
            audio.addEventListener('ended', nextTrack);
            
            shuffleBtn.addEventListener('click', () => {
                isShuffle = !isShuffle;
                shuffleBtn.classList.toggle('active', isShuffle);
            });

            audio.addEventListener('timeupdate', () => {
                currentTimeEl.textContent = formatTime(audio.currentTime);
                if (audio.duration) {
                    const progressPercent = (audio.currentTime / audio.duration) * 100;
                    seekProgress.style.width = `${progressPercent}%`;
                }
            });
            audio.addEventListener('loadedmetadata', () => { durationTimeEl.textContent = formatTime(audio.duration); });
            seekBar.addEventListener('click', (e) => {
                const seekTo = (e.offsetX / seekBar.offsetWidth) * audio.duration;
                audio.currentTime = seekTo;
            });

            volumeSlider.addEventListener('input', (e) => { audio.volume = e.target.value; });

            searchInput.addEventListener('input', (e) => {
                const termino = e.target.value.toLowerCase();
                const cancionSonandoActualmente = playlistFiltrada[currentTrackIndex];

                playlistFiltrada = cancionesOriginales.filter(c => 
                    (c.titulo && c.titulo.toLowerCase().includes(termino)) || 
                    (c.artista && c.artista.toLowerCase().includes(termino))
                );
                
                if (playlistFiltrada.length > 0) {
                    if (cancionSonandoActualmente) {
                        const nuevoIndice = playlistFiltrada.findIndex(c => c.archivo_url === cancionSonandoActualmente.archivo_url);
                        currentTrackIndex = nuevoIndice !== -1 ? nuevoIndice : 0;
                    } else {
                        currentTrackIndex = 0;
                    }
                    renderPlaylist(playlistFiltrada);
                } else {
                    playlistEl.innerHTML = '<p style="font-size:0.85em; color:#808088; text-align:center; padding:10px;">No se encontraron resultados</p>';
                }
            });
        }

        function loadTrack(index) {
            if (!playlistFiltrada[index]) return;
            const track = playlistFiltrada[index];
            
            titleEl.textContent = track.titulo || "Sin título";
            artistEl.textContent = track.artista || "Artista Desconocido";
            seekProgress.style.width = '0%';
            currentTimeEl.textContent = '0:00';

            audio.src = track.archivo_url; 
            audio.load(); 

            if (track.portada_url) {
                coverEl.style.backgroundImage = `url('${track.portada_url}')`;
                coverEl.style.backgroundSize = 'cover';
            } else {
                coverEl.style.backgroundImage = '';
                coverEl.style.backgroundSize = '40%';
            }
        }

        function togglePlay() {
            if (isPlaying) { audio.pause(); playBtn.textContent = '▶'; } 
            else { audio.play(); playBtn.textContent = '⏸'; }
            isPlaying = !isPlaying;
        }

        function nextTrack() {
            if (playlistFiltrada.length === 0) return;
            if (isShuffle) {
                let randomIndex = Math.floor(Math.random() * playlistFiltrada.length);
                while (randomIndex === currentTrackIndex && playlistFiltrada.length > 1) {
                    randomIndex = Math.floor(Math.random() * playlistFiltrada.length);
                }
                currentTrackIndex = randomIndex;
            } else {
                currentTrackIndex = (currentTrackIndex + 1) % playlistFiltrada.length;
            }
            loadTrack(currentTrackIndex);
            actualizarResaltadoLista();
            if (isPlaying) audio.play();
        }

        function prevTrack() {
            if (playlistFiltrada.length === 0) return;
            currentTrackIndex = (currentTrackIndex - 1 + playlistFiltrada.length) % playlistFiltrada.length;
            loadTrack(currentTrackIndex);
            actualizarResaltadoLista();
            if (isPlaying) audio.play();
        }
    </script>
</body>
</html>
