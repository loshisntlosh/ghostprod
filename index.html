<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Reproductor Inteligente V3.1</title>
    <style>
        /* CONFIGURACIÓN GENERAL */
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0f0f12;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
        }

        /* CAPA DE FONDO DINÁMICO CON BLUR */
        .background-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-size: cover;
            background-position: center;
            filter: blur(25px);
            transform: scale(1.1);
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        @media (max-width: 767px) or (orientation: portrait) {
            .background-blur { background-image: url('vertical.jpg'); }
        }

        @media (min-width: 768px) and (orientation: landscape) {
            .background-blur { background-image: url('horizontal.jpg'); }
        }

        .background-blur.show-bg { opacity: 0.35; }

        /* PANTALLA DE CONTRASEÑA */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0f0f12;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        .login-box {
            background: linear-gradient(145deg, #18181c, #121214);
            padding: 35px 25px;
            border-radius: 28px;
            text-align: center;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #252529;
        }
        .login-box h2 { margin: 0 0 10px 0; font-size: 1.6em; font-weight: 700; }
        .login-box p { color: #a0a0ab; font-size: 0.9em; margin: 0 0 25px 0; }
        .login-input {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            border: 1px solid #252529;
            background-color: #1e1e24;
            color: white;
            font-size: 1em;
            outline: none;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }
        .login-input:focus { border-color: #ffffff40; }
        .login-btn {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            border: none;
            background-color: #ffffff;
            color: #000000;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .login-btn:active { transform: scale(0.98); }
        .login-error { color: #ff4a4a; font-size: 0.85em; margin-top: 15px; min-height: 18px; font-weight: 500; }

        /* REPRODUCTOR PRINCIPAL */
        .player-container {
            background: rgba(24, 24, 28, 0.85);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 360px;
            padding: 25px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-bar {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid #252529;
            background-color: #1e1e24;
            color: white;
            font-size: 0.95em;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
        }
        .search-bar:focus { background-color: #2e2e34; border-color: #ffffff40; }
        .search-bar::placeholder { color: #808088; }

        .player-content { display: flex; flex-direction: column; align-items: center; text-align: center; }

        .cover-art {
            width: 240px;
            height: 240px;
            background-color: #252529;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="%23555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>');
            background-position: center;
            background-size: 40%;
            background-repeat: no-repeat;
            border-radius: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .track-info { width: 100%; }
        .track-title { font-size: 1.4em; margin: 0 0 6px; font-weight: bold; }
        .track-artist { color: #a0a0ab; font-size: 1em; margin: 0 0 15px; word-break: break-word; }

        .seek-container { width: 100%; display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; font-size: 0.8em; color: #a0a0ab; }
        .seek-bar { flex: 1; margin: 0 10px; height: 5px; border-radius: 5px; background-color: #252529; position: relative; cursor: pointer; overflow: hidden; }
        .seek-progress { height: 100%; border-radius: 5px; background-color: #ffffff; width: 0%; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 15px; }
        .controls button { background: none; border: none; color: white; font-size: 2em; cursor: pointer; opacity: 0.8; transition: transform 0.1s; }
        .controls button:hover { opacity: 1; }
        .controls button:active { transform: scale(0.9); }
        
        .play-btn {
            background-color: #ffffff !important;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000000 !important;
            font-size: 1.4em !important;
            box-shadow: 0 6px 15px rgba(255,255,255,0.2);
            opacity: 1 !important;
        }

        #shuffleBtn.active { color: #1db954; opacity: 1; text-shadow: 0 0 5px rgba(29, 185, 84, 0.5); }

        .volume-container { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; color: #a0a0ab; font-size: 0.9em; }
        .volume-slider { -webkit-appearance: none; width: 60%; height: 4px; border-radius: 5px; background: #252529; outline: none; cursor: pointer; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #ffffff; }

        .playlist-container { border-top: 1px solid #252529; padding-top: 15px; max-height: 180px; overflow-y: auto; text-align: left; }
        .playlist-container::-webkit-scrollbar { width: 6px; }
        .playlist-container::-webkit-scrollbar-thumb { background: #252529; border-radius: 10px; }

        .playlist-item { display: flex; align-items: center; padding: 12px 15px; border-radius: 12px; cursor: pointer; margin-bottom: 4px; transition: background 0.2s; }
        .playlist-item:hover { background-color: #1e1e24; }
        .playlist-item.active { background-color: rgba(255, 255, 255, 0.08); border-left: 4px solid #ffffff; color: #1db954; }

        .playlist-item-info { flex: 1; min-width: 0; }
        .playlist-item-title { font-size: 0.95em; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .playlist-item-artist { font-size: 0.85em; color: #a0a0ab; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (orientation: landscape) and (max-height: 500px) {
            body { padding: 10px; }
            .player-container { max-width: 640px; padding: 15px; }
            .search-bar { margin-bottom: 12px; }
            .player-content { flex-direction: row; text-align: left; justify-content: space-around; align-items: flex-start; gap: 15px; }
            .cover-art { width: 120px; height: 120px; margin-bottom: 0; background-size: 35%; }
            .track-info { width: auto; flex: 1; display: flex; flex-direction: column; }
            .controls { justify-content: flex-start; gap: 20px; margin-bottom: 10px; }
            .play-btn { width: 50px; height: 50px; font-size: 1.1em !important; }
            .volume-container { margin-bottom: 10px; justify-content: flex-start; }
            .playlist-container { max-height: 120px; }
        }
    </style>
</head>
<body>

    <div id="bgBlur" class="background-blur"></div>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2>Acceso Privado</h2>
            <p>Por favor ingresa la contraseña para continuar</p>
            <input type="password" id="passwordInput" class="login-input" placeholder="••••••••">
            <button id="loginBtn" class="login-btn">Entrar</button>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <div class="player-container">
        <input type="text" id="search" class="search-bar" placeholder="Buscar canción o artista...">

        <div class="player-content">
            <div id="cover" class="cover-art"></div>
            
            <div class="track-info">
                <h2 id="title" class="track-title">Conectando...</h2>
                <p id="artist" class="track-artist">Por favor espera</p>
                
                <div class="seek-container">
                    <span id="currentTime">0:00</span>
                    <div id="seekBar" class="seek-bar">
                        <div id="seekProgress" class="seek-progress"></div>
                    </div>
                    <span id="durationTime">0:00</span>
                </div>

                <div class="controls">
                    <button id="shuffleBtn">🔀</button>
                    <button id="prevBtn">⏮</button>
                    <button id="playBtn" class="play-btn">▶</button>
                    <button id="nextBtn">⏭</button>
                </div>

                <div class="volume-container">
                    <span>🔈</span>
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
                    <span>🔊</span>
                </div>

                <div id="playlist" class="playlist-container"></div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="auto"></audio>

    <script>
        // REGISTRO DEL SERVICE WORKER (Para soporte Offline de la página)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Offline activo con éxito.'))
                    .catch(err => console.log('Error de caché offline:', err));
            });
        }

        const SUPABASE_URL = "https://xkbxlrmodzucmpxcnwtj.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhrYnhscm1vZHp1Y21weGNud3RqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNjA4MjIsImV4cCI6MjA5ODgzNjgyMn0.GQdaROzvGo1JTd3IYb5vDetuO5cq6UiGFrGHN7azWy8";

        let cancionesOriginales = []; 
        let playlistFiltrada = [];    
        let currentTrackIndex = 0;
        let isPlaying = false;
        let isShuffle = false;

        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const titleEl = document.getElementById('title');
        const artistEl = document.getElementById('artist');
        const coverEl = document.getElementById('cover');
        const searchInput = document.getElementById('search');
        const playlistEl = document.getElementById('playlist');
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');
        const seekBar = document.getElementById('seekBar');
        const seekProgress = document.getElementById('seekProgress');
        const volumeSlider = document.getElementById('volumeSlider');
        const bgBlur = document.getElementById('bgBlur');

        const loginOverlay = document.getElementById('loginOverlay');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');

        function validarAcceso() {
            if (passwordInput.value === "monter1a") {
                loginOverlay.style.opacity = '0';
                setTimeout(() => { loginOverlay.style.display = 'none'; }, 400);
                bgBlur.classList.add('show-bg');
                cargarCanciones();
            } else {
                loginError.textContent = "Contraseña incorrecta. Inténtalo de nuevo.";
                passwordInput.value = "";
                passwordInput.focus();
            }
        }

        loginBtn.addEventListener('click', validarAcceso);
        passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') validarAcceso(); });

        async function cargarCanciones() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/canciones?select=*`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                });
                
                if (!response.ok) throw new Error("Fallo de red");

                cancionesOriginales = await response.json();
                // Respaldamos los datos JSON localmente para cuando no haya internet
                localStorage.setItem('db_cache_canciones', JSON.stringify(cancionesOriginales));
            } catch (e) { 
                console.log("Modo sin internet detectado. Cargando desde almacenamiento local.");
                const dataGuardada = localStorage.getItem('db_cache_canciones');
                if (dataGuardada) {
                    cancionesOriginales = JSON.parse(dataGuardada);
                } else {
                    titleEl.textContent = "Sin Conexión"; 
                    artistEl.textContent = "Aún no hay canciones descargadas en caché.";
                    return;
                }
            }

            playlistFiltrada = [...cancionesOriginales];
            if (playlistFiltrada.length > 0) { 
                initPlayer(); 
                descargarMusicaEnSegundoPlano(); // Inicia la descarga inteligente
            }
        }

        // FUNCIÓN NUEVA: Guarda los archivos de audio reales en el caché del dispositivo
        async function descargarMusicaEnSegundoPlano() {
            try {
                const cache = await caches.open('reproductor-archivos-audio');
                cancionesOriginales.forEach(async (track) => {
                    const cacheado = await cache.match(track.archivo_url);
                    if (!cacheado && track.archivo_url) {
                        cache.add(track.archivo_url).catch(err => console.log("Descarga pospuesta: ", track.titulo));
                    }
                });
            } catch (err) { console.log("Caché de audio no soportado aún."); }
        }

        function renderPlaylist(songs) {
            playlistEl.innerHTML = '';
            songs.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = `playlist-item ${index === currentTrackIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="playlist-item-info">
                        <p class="playlist-item-title">${track.titulo || 'Sin título'}</p>
                        <p class="playlist-item-artist">${track.artista || 'Artista desconocido'}</p>
                    </div>
                `;
                item.addEventListener('click', () => {
                    currentTrackIndex = index;
                    loadTrack(currentTrackIndex);
                    audio.play();
                    isPlaying = true;
                    playBtn.textContent = '⏸';
                    actualizarMediaSessionPlayback('playing');
                    actualizarResaltadoLista();
                });
                playlistEl.appendChild(item);
            });
        }

        function actualizarResaltadoLista() {
            const items = playlistEl.querySelectorAll('.playlist-item');
            items.forEach((item, index) => {
                if (index === currentTrackIndex) {
                    item.classList.add('active');
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function actualizarMediaSessionPlayback(state) {
            if ('mediaSession' in navigator) { navigator.mediaSession.playbackState = state; }
        }

        function initPlayer() {
            audio.volume = volumeSlider.value;
            loadTrack(currentTrackIndex);
            renderPlaylist(playlistFiltrada);

            playBtn.addEventListener('click', togglePlay);
            nextBtn.addEventListener('click', nextTrack);
            prevBtn.addEventListener('click', prevTrack);
            audio.addEventListener('ended', nextTrack);
            
            shuffleBtn.addEventListener('click', () => {
                isShuffle = !isShuffle;
                shuffleBtn.classList.toggle('active', isShuffle);
            });

            audio.addEventListener('timeupdate', () => {
                currentTimeEl.textContent = formatTime(audio.currentTime);
                if (audio.duration) {
                    const progressPercent = (audio.currentTime / audio.duration) * 100;
                    seekProgress.style.width = `${progressPercent}%`;
                }
            });
            audio.addEventListener('loadedmetadata', () => { durationTimeEl.textContent = formatTime(audio.duration); });
            seekBar.addEventListener('click', (e) => {
                const seekTo = (e.offsetX / seekBar.offsetWidth) * audio.duration;
                audio.currentTime = seekTo;
            });

            volumeSlider.addEventListener('input', (e) => { audio.volume = e.target.value; });

            // CORRECCIÓN DEL BUSCADOR: Ya no detiene la música al escribir
            searchInput.addEventListener('input', (e) => {
                const termino = e.target.value.toLowerCase();
                const cancionSonandoActualmente = playlistFiltrada[currentTrackIndex];

                playlistFiltrada = cancionesOriginales.filter(c => 
                    (c.titulo && c.titulo.toLowerCase().includes(termino)) || 
                    (c.artista && c.artista.toLowerCase().includes(termino))
                );
                
                if (playlistFiltrada.length > 0) {
                    // Si lo que estaba sonando sigue en la búsqueda, re-sincronizamos el índice en silencio
                    if (cancionSonandoActualmente) {
                        const nuevoIndice = playlistFiltrada.findIndex(c => c.archivo_url === cancionSonandoActualmente.archivo_url);
                        currentTrackIndex = nuevoIndice !== -1 ? nuevoIndice : 0;
                    } else {
                        currentTrackIndex = 0;
                    }
                    renderPlaylist(playlistFiltrada);
                } else {
                    playlistEl.innerHTML = '<p style="font-size:0.85em; color:#808088; text-align:center; padding:10px;">No se encontraron resultados</p>';
                }
            });

            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', () => { audio.play(); isPlaying = true; playBtn.textContent = '⏸'; actualizarMediaSessionPlayback('playing'); });
                navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); isPlaying = false; playBtn.textContent = '▶'; actualizarMediaSessionPlayback('paused'); });
                navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
                navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
            }
        }

        // LOGICA DE CARGA OPTIMIZADA (Intenta reproducir la versión descargada localmente)
        async function loadTrack(index) {
            if (!playlistFiltrada[index]) return;
            const track = playlistFiltrada[index];
            
            titleEl.textContent = track.titulo || "Sin título";
            artistEl.textContent = track.artista || "Artista Desconocido";
            seekProgress.style.width = '0%';
            currentTimeEl.textContent = '0:00';

            // Comprobar si la canción está en la caché interna
            try {
                const cache = await caches.open('reproductor-archivos-audio');
                const respuestaCacheada = await cache.match(track.archivo_url);
                if (respuestaCacheada) {
                    const audioBlob = await respuestaCacheada.blob();
                    audio.src = URL.createObjectURL(audioBlob); // Usa el archivo descargado
                    console.log("Cargado desde caché interna offline.");
                } else {
                    audio.src = track.archivo_url; // Usa internet si no se ha terminado de descargar
                }
            } catch (err) {
                audio.src = track.archivo_url;
            }

            if (track.portada_url) {
                coverEl.style.backgroundImage = `url('${track.portada_url}')`;
                coverEl.style.backgroundSize = 'cover';
            } else {
                coverEl.style.backgroundImage = '';
                coverEl.style.backgroundSize = '40%';
            }

            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: titleEl.textContent,
                    artist: artistEl.textContent,
                    album: 'Mi Playlist Privada',
                    artwork: [{ src: track.portada_url || '', sizes: '300x300', type: 'image/jpeg' }]
                });
            }
        }

        function togglePlay() {
            if (isPlaying) { audio.pause(); playBtn.textContent = '▶'; actualizarMediaSessionPlayback('paused'); } 
            else { audio.play(); playBtn.textContent = '⏸'; actualizarMediaSessionPlayback('playing'); }
            isPlaying = !isPlaying;
        }

        function nextTrack() {
            if (playlistFiltrada.length === 0) return;
            if (isShuffle) {
                let randomIndex = Math.floor(Math.random() * playlistFiltrada.length);
                while (randomIndex === currentTrackIndex && playlistFiltrada.length > 1) {
                    randomIndex = Math.floor(Math.random() * playlistFiltrada.length);
                }
                currentTrackIndex = randomIndex;
            } else {
                currentTrackIndex = (currentTrackIndex + 1) % playlistFiltrada.length;
            }
            loadTrack(currentTrackIndex);
            actualizarResaltadoLista();
            if (isPlaying) { audio.play(); actualizarMediaSessionPlayback('playing'); }
        }

        function prevTrack() {
            if (playlistFiltrada.length === 0) return;
            currentTrackIndex = (currentTrackIndex - 1 + playlistFiltrada.length) % playlistFiltrada.length;
            loadTrack(currentTrackIndex);
            actualizarResaltadoLista();
            if (isPlaying) { audio.play(); actualizarMediaSessionPlayback('playing'); }
        }
    </script>
</body>
</html>
