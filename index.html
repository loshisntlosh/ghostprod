<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Reproductor">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3844/3844724.png">
    <title>Music App Premium</title>
    <style>
        :root {
            --bg-principal: #121212;
            --bg-tarjeta: #181818;
            --bg-tarjeta-hover: #282828;
            --texto-principal: #ffffff;
            --texto-secundario: #b3b3b3;
            --apple-accent: #1ed760; /* Verde estilo Spotify/Apple Music vibrante */
            --nav-bg: #000000;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            padding-bottom: 140px; /* Espacio para el mini-reproductor y la barra inferior */
        }

        /* PANTALLA DE LOGIN / USUARIOS */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease;
        }
        .login-box {
            background: var(--bg-tarjeta);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 340px;
            width: 90%;
            border: 1px solid #282828;
        }
        .login-box h2 { font-size: 1.8em; margin-bottom: 8px; font-weight: 700; }
        .login-box p { color: var(--texto-secundario); font-size: 0.9em; margin-bottom: 25px; }
        .login-input {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333;
            background: #222; color: #fff; font-size: 1.1em; text-align: center; margin-bottom: 15px; outline: none;
        }
        .login-btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            background-color: var(--apple-accent); color: black; font-size: 1em; font-weight: 700; cursor: pointer;
        }
        .gesture-init-btn {
            width: 100%; padding: 12px; margin-top: 12px; border-radius: 12px;
            border: 1px solid #333; background: transparent; color: #fff; font-size: 0.95em; font-weight: 600; cursor: pointer;
        }

        /* SECCIONES DE LA APLICACIÓN */
        .app-section {
            display: none;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }
        .app-section.active { display: block; }

        h1 { font-size: 1.8em; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.5px; }
        h2 { font-size: 1.3em; font-weight: 700; margin: 20px 0 12px 0; }

        /* GRILLA ESTILO INICIO (CAPTURA 1) */
        .grid-recientes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }
        .tarjeta-reciente {
            background: var(--bg-tarjeta);
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: background 0.2s;
        }
        .tarjeta-reciente:hover { background: var(--bg-tarjeta-hover); }
        .tarjeta-reciente img, .tarjeta-reciente .img-placeholder {
            width: 56px; height: 56px; background: #282828; flex-shrink: 0;
            background-size: cover; background-position: center;
        }
        .tarjeta-reciente span { font-size: 0.85em; font-weight: 600; padding-right: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* LISTAS DE CANCIONES / PLAYLISTS */
        .track-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 8px 0;
            cursor: pointer;
        }
        .track-cover {
            width: 48px; height: 48px; border-radius: 4px; background: #282828;
            background-size: cover; background-position: center; flex-shrink: 0;
        }
        .track-meta { flex: 1; min-width: 0; }
        .track-title { font-size: 0.95em; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 0.85em; color: var(--texto-secundario); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-actions { display: flex; align-items: center; gap: 15px; }
        .btn-heart { background: none; border: none; color: var(--texto-secundario); font-size: 1.2em; cursor: pointer; }
        .btn-heart.active { color: var(--apple-accent); }
        .btn-more { background: none; border: none; color: var(--texto-secundario); font-size: 1.2em; cursor: pointer; padding: 5px; }

        /* BUSCADOR */
        .search-box {
            width: 100%; padding: 14px 16px; border-radius: 8px; border: none;
            background: #222; color: #fff; font-size: 1em; outline: none; margin-bottom: 20px;
        }

        /* SECCIÓN CREAR */
        .create-container {
            background: var(--bg-tarjeta); padding: 20px; border-radius: 12px; text-align: center;
        }
        .create-input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333;
            background: #121212; color: #fff; font-size: 1em; margin-bottom: 15px; outline: none;
        }

        /* MINI REPRODUCTOR FLOTANTE FIJO */
        .mini-player {
            position: fixed;
            bottom: 65px; left: 5px; right: 5px;
            background: #1f1f1f;
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 900;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .mini-info { flex: 1; min-width: 0; }
        .mini-title { font-size: 0.85em; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-artist { font-size: 0.75em; color: var(--texto-secundario); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-controls { display: flex; align-items: center; gap: 15px; }
        .mini-btn { background: none; border: none; color: #fff; font-size: 1.4em; cursor: pointer; }

        /* BARRA DE NAVEGACIÓN INFERIOR (ESTILO CAPTURAS) */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 60px;
            background: var(--nav-bg);
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--texto-secundario);
            font-size: 0.65em;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            gap: 4px;
        }
        .nav-item.active { color: #fff; }
        .nav-item svg { width: 22px; height: 22px; fill: currentColor; }

        /* MODAL PARA AGREGAR A PLAYLIST */
        .modal-playlist {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: var(--bg-tarjeta); width: 85%; max-width: 320px;
            padding: 24px; border-radius: 16px; border: 1px solid #333;
        }
        .modal-content h3 { margin-bottom: 15px; font-size: 1.1em; }
        .modal-list { max-height: 200px; overflow-y: auto; margin-bottom: 15px; }
        .modal-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; font-size: 0.95em; }
        .modal-item:hover { background: #222; }
        .modal-close {
            width: 100%; padding: 10px; background: #333; border: none;
            color: #fff; border-radius: 8px; font-weight: 600; cursor: pointer;
        }

        /* INTERFAZ GESTO (REUTILIZADA) */
        .gesture-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18,18,18,0.95); z-index: 10000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .gesture-overlay.open { display: flex; }
        .gesture-area { width: 100%; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; touch-action: none; }
        .gesture-icon { font-size: 3em; margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- ACCESO Y FILTRO DE USUARIOS -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2>Música Privada</h2>
            <p>Ingresa tu clave de usuario personal</p>
            <input type="password" id="passwordInput" class="login-input" placeholder="Clave de acceso">
            <button id="loginBtn" class="login-btn">Iniciar Sesión</button>
            <button id="gestureInitBtn" class="gesture-init-btn">📱 Gesto de un dedo</button>
            <div id="loginError" style="color:#ff3b30; font-size:0.85em; margin-top:15px; font-weight:600;"></div>
        </div>
    </div>

    <!-- PANTALLA GESTO -->
    <div id="gestureOverlay" class="gesture-overlay">
        <div id="gestureArea" class="gesture-area">
            <div class="gesture-icon">✌️👇</div>
            <h3>Desbloqueo Táctil</h3>
            <p style="color:var(--texto-secundario); font-size:0.9em; text-align:center; max-width:220px; margin-top:8px;">Desliza dos dedos hacia abajo para ingresar.</p>
        </div>
        <button onclick="document.getElementById('gestureOverlay').classList.remove('open')" style="margin-bottom:40px; padding:10px 20px; background:#222; color:#fff; border:none; border-radius:20px;">Cancelar</button>
    </div>

    <!-- SECCIÓN 1: INICIO -->
    <section id="sec-inicio" class="app-section active">
        <h1 id="saludoUsuario">Hola</h1>
        <h2>Escuchado recientemente</h2>
        <div class="grid-recientes" id="gridRecientes">
            <!-- Dinámico -->
        </div>
        <h2>Recomendaciones para ti</h2>
        <div id="listaRecomendados"></div>
    </section>

    <!-- SECCIÓN 2: BUSCADOR -->
    <section id="sec-buscar" class="app-section">
        <h1>Buscar</h1>
        <input type="text" id="searchInput" class="search-box" placeholder="¿Qué quieres escuchar?">
        <div id="resultadosBusqueda"></div>
    </section>

    <!-- SECCIÓN 3: TU BIBLIOTECA -->
    <section id="sec-biblioteca" class="app-section">
        <h1>Tu biblioteca</h1>
        <div id="listaPlaylistsBiblioteca">
            <!-- Dinámico (Sección Tus Me Gusta + Playlists Creadas) -->
        </div>
    </section>

    <!-- SECCIÓN 4: CREAR -->
    <section id="sec-crear" class="app-section">
        <h1>Crear Playlist</h1>
        <div class="create-container">
            <input type="text" id="newPlaylistName" class="create-input" placeholder="Nombre de tu nueva playlist">
            <button id="btnCreatePlaylist" class="login-btn">Crear ahora</button>
        </div>
    </section>

    <!-- MINI REPRODUCTOR FIJO INFERIOR -->
    <div class="mini-player" id="miniPlayer">
        <div class="track-cover" id="miniCover"></div>
        <div class="mini-info">
            <div class="mini-title" id="miniTitle">Ninguna canción</div>
            <div class="mini-artist" id="miniArtist">-</div>
        </div>
        <div class="mini-controls">
            <button class="mini-btn" id="miniPlayBtn">▶</button>
            <button class="mini-btn" id="miniNextBtn">⏭</button>
        </div>
    </div>

    <!-- BARRA DE NAVEGACIÓN INFERIOR -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="cambiarSeccion('sec-inicio', this)">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            Inicio
        </div>
        <div class="nav-item" onclick="cambiarSeccion('sec-buscar', this)">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            Buscar
        </div>
        <div class="nav-item" onclick="cambiarSeccion('sec-biblioteca', this)">
            <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
            Biblioteca
        </div>
        <div class="nav-item" onclick="cambiarSeccion('sec-crear', this)">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            Crear
        </div>
    </nav>

    <!-- MODAL AGREGAR A PLAYLIST -->
    <div id="modalPlaylist" class="modal-playlist">
        <div class="modal-content">
            <h3>Agregar a playlist</h3>
            <div class="modal-list" id="modalPlaylistList"></div>
            <button class="modal-close" onclick="cerrarModalPlaylist()">Cancelar</button>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        const SUPABASE_URL = "https://xkbxlrmodzucmpxcnwtj.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhrYnhscm1vZHp1Y21weGNud3RqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNjA4MjIsImV4cCI6MjA5ODgzNjgyMn0.GQdaROzvGo1JTd3IYb5vDetuO5cq6UiGFrGHN7azWy8";

        let usuarioActual = ""; 
        let cancionesGlobales = [];
        let datosUsuario = { favoritos: [], recientes: [], playlists: {} };

        let currentTrackIndex = -1;
        let isPlaying = false;
        let trackSeleccionadoParaPlaylist = null;

        const audio = document.getElementById('audioPlayer');

        // VALIDACIÓN DE ID DE SESIÓN
        function login(codigo) {
            if (codigo === "monter1a") {
                usuarioActual = "Tu_Nombre"; 
            } else if (codigo === "amigo123") {
                usuarioActual = "Tu_Amigo";
            } else {
                document.getElementById('loginError').textContent = "Código incorrecta.";
                return;
            }
            document.getElementById('saludoUsuario').textContent = "Hola, " + usuarioActual.replace("_", " ");
            document.getElementById('loginOverlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loginOverlay').style.display = 'none', 400);
            
            cargarDatosPerfil();
            cargarCancionesSupabase();
        }

        document.getElementById('loginBtn').addEventListener('click', () => login(document.getElementById('passwordInput').value));

        // DETECCIÓN DE GESTO MULTI-TOUCH
        let touchStartY = 0;
        let esGestoValido = false;
        document.getElementById('gestureInitBtn').addEventListener('click', () => document.getElementById('gestureOverlay').classList.add('open'));
        
        const gestureArea = document.getElementById('gestureArea');
        gestureArea.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                esGestoValido = true;
                touchStartY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            }
        });
        gestureArea.addEventListener('touchmove', (e) => {
            if (!esGestoValido || e.touches.length !== 2) return;
            let currentY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            if (currentY - touchStartY > 120) {
                esGestoValido = false;
                document.getElementById('gestureOverlay').classList.remove('open');
                login("monter1a"); // Entra por defecto al tuyo con gesto
            }
        });

        // CARGA E INTERCAMBIO ESTRUCTURAL DE DATOS LOCALES
        function cargarDatosPerfil() {
            let infoLocal = localStorage.getItem("perfil_" + usuarioActual);
            if (infoLocal) {
                datosUsuario = JSON.parse(infoLocal);
                if (!datosUsuario.playlists) datosUsuario.playlists = {};
                if (!datosUsuario.recientes) datosUsuario.recientes = [];
                if (!datosUsuario.favoritos) datosUsuario.favoritos = [];
            } else {
                datosUsuario = { favoritos: [], recientes: [], playlists: {} };
            }
        }

        function guardarDatosPerfil() {
            localStorage.setItem("perfil_" + usuarioActual, JSON.stringify(datosUsuario));
        }

        async function cargarCancionesSupabase() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/canciones?select=*`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                });
                cancionesGlobales = await response.json();
                renderizarSeccionInicio();
                renderizarBiblioteca();
            } catch (e) {
                console.error("Error cargando música", e);
            }
        }

        // NAVEGACIÓN ENTRE SECCIONES
        function cambiarSeccion(idSec, elemento) {
            document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(idSec).classList.add('active');
            elemento.classList.add('active');
            
            if (idSec === 'sec-inicio') renderizarSeccionInicio();
            if (idSec === 'sec-biblioteca') renderizarBiblioteca();
        }

        // CONTROLADORES DE RENDERIZADO VISUAL
        function crearFilaCancion(track, index, contenedorLista) {
            const esFav = datosUsuario.favoritos.includes(track.archivo_url);
            const fila = document.createElement('div');
            fila.className = 'track-row';
            
            fila.innerHTML = `
                <div class="track-cover" style="background-image: url('${track.portada_url || ''}')"></div>
                <div class="track-meta" onclick="reproducirCancionDirecta('${track.archivo_url}')">
                    <div class="track-title">${track.titulo || 'Sin título'}</div>
                    <div class="track-artist">${track.artista || 'Desconocido'}</div>
                </div>
                <div class="track-actions">
                    <button class="btn-heart ${esFav?'active':''}" onclick="toggleFavorito('${track.archivo_url}', this)">♥</button>
                    <button class="btn-more" onclick="abrirModalPlaylist('${track.archivo_url}')">⋮</button>
                </div>
            `;
            contenedorLista.appendChild(fila);
        }

        function renderizarSeccionInicio() {
            // Muestra los recientes (Grilla de la captura 1)
            const grid = document.getElementById('gridRecientes');
            grid.innerHTML = "";
            
            // Filtramos canciones globales que coincidan con URLs de recientes
            let listaRecientes = cancionesGlobales.filter(c => datosUsuario.recientes.includes(c.archivo_url)).slice(0, 6);
            
            // Añadir siempre la tarjeta de "Tus Me Gusta" fija al inicio de la grilla
            const divFavs = document.createElement('div');
            divFavs.className = "tarjeta-recent";
            divFavs.innerHTML = `
                <div class="tarjeta-reciente" onclick="cambiarSeccion('sec-biblioteca', document.querySelectorAll('.nav-item')[2])">
                    <div class="img-placeholder" style="background: linear-gradient(135deg, #450eff, #adc1ff); display:flex; align-items:center; justify-content:center;">♥</div>
                    <span>Tus me gusta</span>
                </div>
            `;
            grid.appendChild(divFavs);

            listaRecientes.forEach(track => {
                const item = document.createElement('div');
                item.className = "tarjeta-reciente";
                item.onclick = () => reproducirCancionDirecta(track.archivo_url);
                item.innerHTML = `
                    <div class="img-placeholder" style="background-image:url('${track.portada_url}')"></div>
                    <span>${track.titulo}</span>
                `;
                grid.appendChild(item);
            });

            // Lista extendida de Recomendados
            const contenedorRec = document.getElementById('listaRecomendados');
            contenedorRec.innerHTML = "";
            cancionesGlobales.slice(0, 10).forEach((t, idx) => crearFilaCancion(t, idx, contenedorRec));
        }

        // MOTOR DE BÚSQUEDA EN TIEMPO REAL
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const contenedor = document.getElementById('resultadosBusqueda');
            contenedor.innerHTML = "";
            if(!query) return;

            const filtrados = cancionesGlobales.filter(c => 
                c.titulo?.toLowerCase().includes(query) || c.artista?.toLowerCase().includes(query)
            );
            filtrados.forEach((t, idx) => crearFilaCancion(t, idx, contenedor));
        });

        // INTERFAZ DE BIBLIOTECA (CAPTURA 2)
        function renderizarBiblioteca() {
            const contenedor = document.getElementById('listaPlaylistsBiblioteca');
            contenedor.innerHTML = "";

            // 1. Tarjeta Fija de Favoritos
            const rowFav = document.createElement('div');
            rowFav.className = "track-row";
            rowFav.onclick = () => reproducirPlaylistEspecial("favoritos");
            rowFav.innerHTML = `
                <div class="track-cover" style="background: linear-gradient(135deg, #450eff, #adc1ff); display:flex; align-items:center; justify-content:center; font-size:1.3em;">F</div>
                <div class="track-meta">
                    <div class="track-title">Tus me gusta</div>
                    <div class="track-artist">Playlist • ${datosUsuario.favoritos.length} canciones</div>
                </div>
            `;
            contenedor.appendChild(rowFav);

            // 2. Renderizar Playlists creadas por el usuario
            Object.keys(datosUsuario.playlists).forEach(nombre => {
                const row = document.createElement('div');
                row.className = "track-row";
                row.onclick = () => reproducirPlaylistEspecial(nombre);
                row.innerHTML = `
                    <div class="track-cover" style="background:#282828; display:flex; align-items:center; justify-content:center; color:var(--apple-accent); font-weight:bold;">P</div>
                    <div class="track-meta">
                        <div class="track-title">${nombre}</div>
                        <div class="track-artist">Playlist personalizada • ${datosUsuario.playlists[nombre].length} temas</div>
                    </div>
                `;
                contenedor.appendChild(row);
            });
        }

        // GESTIÓN DE CREACIÓN DE PLAYLISTS SIN LÍMITES
        document.getElementById('btnCreatePlaylist').addEventListener('click', () => {
            const input = document.getElementById('newPlaylistName');
            const nombre = input.value.trim();
            if (!nombre) return;

            if (!datosUsuario.playlists[nombre]) {
                datosUsuario.playlists[nombre] = [];
                guardarDatosPerfil();
                input.value = "";
                alert(`Playlist "${nombre}" creada exitosamente.`);
                cambiarSeccion('sec-biblioteca', document.querySelectorAll('.nav-item')[2]);
            } else {
                alert("Ya tienes una playlist con ese nombre.");
            }
        });

        // MODAL PARA AGREGAR CANCIONES A PLAYLISTS
        function abrirModalPlaylist(trackUrl) {
            trackSeleccionadoParaPlaylist = trackUrl;
            const listaMod = document.getElementById('modalPlaylistList');
            listaMod.innerHTML = "";

            if (Object.keys(datosUsuario.playlists).length === 0) {
                listaMod.innerHTML = "<p style='color:var(--texto-secundario); font-size:0.9em; padding:10px;'>No tienes playlists creadas. Ve a la sección 'Crear'.</p>";
            }

            Object.keys(datosUsuario.playlists).forEach(nombre => {
                const item = document.createElement('div');
                item.className = "modal-item";
                item.textContent = nombre;
                item.onclick = () => {
                    if (!datosUsuario.playlists[nombre].includes(trackUrl)) {
                        datosUsuario.playlists[nombre].push(trackUrl);
                        guardarDatosPerfil();
                        alert("Agregada a " + nombre);
                    }
                    cerrarModalPlaylist();
                };
                listaMod.appendChild(item);
            });

            document.getElementById('modalPlaylist').style.display = 'flex';
        }

        function cerrarModalPlaylist() {
            document.getElementById('modalPlaylist').style.display = 'none';
        }

        // LÓGICA LOGÍSTICA DE REPRODUCCIÓN INTERNA
        let colaActual = [];
        let indexCola = 0;

        function reproducirCancionDirecta(trackUrl) {
            colaActual = cancionesGlobales; 
            indexCola = colaActual.findIndex(c => c.archivo_url === trackUrl);
            ejecutarAudio();
            
            // Agregar al historial de recientes únicos
            if (!datosUsuario.recientes.includes(trackUrl)) {
                datosUsuario.recientes.unshift(trackUrl);
                if(datosUsuario.recientes.length > 8) datosUsuario.recientes.pop();
                guardarDatosPerfil();
            }
        }

        function reproducirPlaylistEspecial(tipo) {
            let urls = (tipo === "favoritos") ? datosUsuario.favoritos : datosUsuario.playlists[tipo];
            if (!urls || urls.length === 0) {
                alert("Esta playlist no tiene canciones aún.");
                return;
            }
            colaActual = cancionesGlobales.filter(c => urls.includes(c.archivo_url));
            indexCola = 0;
            ejecutarAudio();
        }

        function ejecutarAudio() {
            if (indexCola < 0 || indexCola >= colaActual.length) return;
            const track = colaActual[indexCola];

            audio.src = track.archivo_url;
            audio.load();
            audio.play().then(() => {
                isPlaying = true;
                document.getElementById('miniPlayBtn').textContent = "⏸";
            });

            document.getElementById('miniTitle').textContent = track.titulo;
            document.getElementById('miniArtist').textContent = track.artista;
            document.getElementById('miniCover').style.backgroundImage = `url('${track.portada_url}')`;
        }

        // INTERACCIONES CON ELEMENTOS MULTIMEDIA INTERNOS
        document.getElementById('miniPlayBtn').addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                document.getElementById('miniPlayBtn').textContent = "▶";
            } else {
                audio.play();
                document.getElementById('miniPlayBtn').textContent = "⏸";
            }
            isPlaying = !isPlaying;
        });

        document.getElementById('miniNextBtn').addEventListener('click', () => {
            if (colaActual.length === 0) return;
            indexCola = (indexCola + 1) % colaActual.length;
            ejecutarAudio();
        });

        audio.addEventListener('ended', () => {
            if (colaActual.length === 0) return;
            indexCola = (indexCola + 1) % colaActual.length;
            ejecutarAudio();
        });

        function toggleFavorito(url, boton) {
            const idx = datosUsuario.favoritos.indexOf(url);
            if (idx === -1) {
                datosUsuario.favoritos.push(url);
                boton.classList.add('active');
            } else {
                datosUsuario.favoritos.splice(idx, 1);
                boton.classList.remove('active');
            }
            guardarDatosPerfil();
        }
    </script>
</body>
</html>
